name: QH
options:
  bundleIdPrefix: com.qh
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: "0.9.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  QH:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: QH
    dependencies:
      - package: ZIPFoundation
    info:
      path: QH/Info.plist
      properties:
        CFBundleDisplayName: 契合
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qh.app
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  QHUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: QHUITests
    dependencies:
      - target: QH
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qh.app.uitests
        TEST_TARGET_NAME: QH

schemes:
  QH:
    build:
      targets:
        QH: all
        QHUITests: [test]
    test:
      targets:
        - QHUITests
